seed: 42

radar:
  speed_of_light: 300000000.0
  carrier_frequency_hz: 2400000000.0
  sample_rate_hz: 20000000.0
  pri_s: 0.00025
  num_pulses: 128
  num_subcarriers: 256
  cyclic_prefix: 64
  direct_path_amplitude_db: -35.0
  clutter_amplitude_db: -45.0
  noise_power_db: -75.0
  epsilon: 1.0e-12

cfar:
  guard_cells_range: 2
  guard_cells_doppler: 2
  train_cells_range: 8
  train_cells_doppler: 8
  pfa: 1.0e-5
  min_abs_velocity_mps: 1.0

scenarios:
  clear_sky:
    name: Clear Sky
    noise_power_db: -75.0
    clutter_amplitude_db: -45.0
    targets: []

  single_slow:
    name: Single Slow Target
    noise_power_db: -75.0
    clutter_amplitude_db: -45.0
    targets:
      - delay_s: 5.0e-6
        doppler_hz: 80.0
        amplitude_db: -18.0

  single_fast:
    name: Single Fast Target
    noise_power_db: -75.0
    clutter_amplitude_db: -45.0
    targets:
      - delay_s: 8.0e-6
        doppler_hz: -350.0
        amplitude_db: -16.0

  two_targets:
    name: Two Targets
    noise_power_db: -75.0
    clutter_amplitude_db: -45.0
    targets:
      - delay_s: 4.5e-6
        doppler_hz: 120.0
        amplitude_db: -18.0
      - delay_s: 7.0e-6
        doppler_hz: -180.0
        amplitude_db: -20.0

  low_snr:
    name: Low SNR Weak Target
    noise_power_db: -82.0
    clutter_amplitude_db: -45.0
    targets:
      - delay_s: 6.0e-6
        doppler_hz: 60.0
        amplitude_db: -24.0
